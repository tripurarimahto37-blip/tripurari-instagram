<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indiagram</title>

<style>
body{
    margin:0;
    background:#fafafa;
    font-family:Arial,sans-serif;
}
.header{
    background:white;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    border-bottom:1px solid #ddd;
}
.post{
    max-width:500px;
    margin:20px auto;
    background:white;
    border:1px solid #ddd;
}
.username{
    padding:10px;
    font-weight:bold;
}
.post img{
    width:100%;
    display:block;
}
.actions{
    padding:10px;
    font-size:24px;
}
.likes{
    padding:0 10px 10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Indiagram</div>

<div class="post">
    <div class="username">Tripurari</div>

    <img src="IMG_20260605_181943_822.webp">

    <div class="actions">
        ❤️ 💬 📤
    </div>

    <div class="likes">
        100 Likes
    </div>
</div>

</body>
</html>
