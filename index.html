<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiagram</title>

<style>
body{
font-family:Arial,sans-serif;
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:20px;
width:350px;
border:1px solid #ddd;
border-radius:10px;
}

h1{
text-align:center;
color:#0095f6;
}

input{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0095f6;
color:white;
border:none;
border-radius:5px;
}

#msg{
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h1>Indiagram</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<button onclick="login()">Login</button>

<button onclick="resetPass()">Forgot Password</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA-iPBBGGO9JArHjp02_aw6sEfe4cPhez4",
authDomain: "indiagram-1796d.firebaseapp.com",
projectId: "indiagram-1796d",
storageBucket: "indiagram-1796d.firebasestorage.app",
messagingSenderId: "550993726424",
appId: "1:550993726424:web:7b2195a5e359ce3db180ad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{
await createUserWithEmailAndPassword(auth,email,password);
msg.innerHTML="Account Created ✅";
}
catch(e){
msg.innerHTML=e.message;
}
}

window.login = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
window.location.href="profile.html";
}
catch(e){
msg.innerHTML="Wrong Email Or Password";
}
}

window.resetPass = async function(){

let email = document.getElementById("email").value;

try{
await sendPasswordResetEmail(auth,email);
msg.innerHTML="Reset Email Sent ✅";
}
catch(e){
msg.innerHTML=e.message;
}
}

</script>

</body>
</html>
