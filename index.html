<!DOCTYPE html>
<html>
<head>
<title>Instagram Clone</title>
<style>
body{
  font-family: Arial;
  background:#fafafa;
  margin:0;
}

.header{
  background:white;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.post{
  background:white;
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:10px;
  border-radius:10px;
}

.post img{
  width:100%;
  border-radius:10px;
}

.username{
  font-weight:bold;
  margin-bottom:10px;
}

.likes{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Instagram</div>

<div class="post">
  <div class="username">Tripurari</div>
  <img src="https://picsum.photos/400/300">
  <div class="likes">❤️ 100 Likes</div>
</div>

<div class="post">
  <div class="username">Friend</div>
  <img src="https://picsum.photos/400/301">
  <div class="likes">❤️ 250 Likes</div>
</div>

</body>
</html>
